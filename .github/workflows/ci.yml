name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - name: Notify Vercel
        if: ${{ always() }}
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - betterforgeprofits-web: lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test
      - name: Notify Vercel
        if: ${{ always() }}
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - betterforgeprofits-web: test
